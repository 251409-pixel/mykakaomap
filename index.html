<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구랑 썸타기 - 친환경 거점 찾기</title>
    <style>
        /* 전체 레이아웃 및 숲 테마 기본 색상 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #1b3b22;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 380px;
            height: 100%;
            background: #1b3b22; 
            display: flex;
            flex-direction: column;
            border-right: 2px solid #142d1a;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }
        
        /* 서비스 타이틀 */
        .sidebar-title {
            padding: 20px 20px 10px 20px;
            color: #e8f5e9;
            margin: 0;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            letter-spacing: -1px;
        }
        
        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            padding: 0 15px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: #254d2e;
            color: #a5d6a7;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
        }
        .tab-btn.active {
            background: #2e7d32;
            color: #ffffff;
            border-bottom: 2px solid #81c784;
        }

        /* 검색 영역 박스 */
        .search-box {
            padding: 15px;
            background: #2e7d32; 
            margin: 0 15px 10px 15px;
            border-radius: 0 0 6px 6px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* 입력창 및 셀렉트 박스 스타일 */
        .search-box select, .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #1b3b22;
            border-radius: 6px;
            font-size: 14px;
            background-color: #1b3b22;
            color: #ffffff;
            box-sizing: border-box;
        }
        .search-box select option {
            background-color: #1b3b22;
            color: #ffffff;
        }

        .search-row {
            display: flex;
            gap: 5px;
        }
        
        /* 버튼 스타일 */
        .btn-search {
            width: 30%;
            padding: 10px;
            background: #81c784; 
            color: #1b3b22;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-nearby {
            width: 100%;
            padding: 10px;
            background: #8d6e63; 
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
        }

        /* 검색 결과 리스트 스타일 */
        #results-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0;
            padding: 10px 15px;
        }
        
        .item {
            padding: 15px;
            border-radius: 8px;
            background: #254d2e;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #81c784;
            position: relative;
        }
        .item:hover {
            background: #2e5a36;
        }
        .item h5 {
            margin: 0 0 8px 0;
            color: #ffffff; 
            font-size: 15px;
            padding-right: 60px;
        }
        .item .info-text {
            font-size: 12px;
            color: #c8e6c9;
            margin: 4px 0;
        }
        .item .label {
            font-weight: bold;
            color: #81c784;
            margin-right: 5px;
        }

        .btn-bookmark {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        .btn-save { background: #fff59d; color: #5d4037; }
        .btn-delete { background: #ffab91; color: #d84315; }

        /* 지도 영역 */
        .map-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        
        .forest-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(46, 125, 50, 0.1);
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 5;
        }

        /* 곰돌이 오버레이 마커 핀 스타일 */
        .bear-marker-pin {
            font-size: 32px;
            cursor: pointer;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.4));
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* 팝업 창 스타일 */
        .info-window-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 160px;
            background: #f1f8e9;
            border-radius: 4px;
        }
        .info-window-content h4 {
            margin: 0 0 5px 0;
            color: #1b3b22;
        }
        .info-window-content p {
            margin: 0;
            color: #4c8c4a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h1 class="sidebar-title">🌳 지구랑 썸타기</h1>
        
        <div class="tab-menu">
            <button id="tab-shop" class="tab-btn active" onclick="switchTab('shop')">제로웨이스트 샵</button>
            <button id="tab-ev" class="tab-btn" onclick="switchTab('ev')">전기차 충전소</button>
            <button id="tab-bookmark" class="tab-btn" onclick="switchTab('bookmark')">⭐ 자주 찾는 곳</button>
        </div>

        <div class="search-box" id="search-area">
            <select id="region-select" onchange="selectRegion()">
                <option value="">-- 탐색할 지역 선택 (도 단위) --</option>
                <option value="서울">서울특별시</option>
                <option value="경기">경기도</option>
                <option value="강원">강원도</option>
                <option value="충북">충청북도</option>
                <option value="충남">충청남도</option>
                <option value="전북">전라북도</option>
                <option value="전남">전라남도</option>
                <option value="경북">경상북도</option>
                <option value="경남">경상남도</option>
                <option value="제주">제주특별자치도</option>
            </select>
            
            <div class="search-row">
                <input type="text" id="keyword" placeholder="제로웨이스트 샵 검색...">
                <button class="btn-search" onclick="searchPlaces()">검색</button>
            </div>

            <button class="btn-nearby" onclick="searchNearby()">📍 내 위치 주변 검색하기</button>
        </div>
        
        <ul id="results-list"></ul>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
        <div class="forest-overlay"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=db51ba2fd4b1815d12500754751086cf&libraries=services&autoload=false"></script>

<script>
    let map;
    let ps; 
    let customOverlays = []; 
    let activeInfoWindow = null; 
    let currentTab = 'shop'; 
    let userLatitude = 37.566826; 
    let userLongitude = 126.9786567; 

    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(userLatitude, userLongitude),
            level: 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        syncUserLocation();
    });

    function syncUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLatitude = position.coords.latitude;
                userLongitude = position.coords.longitude;
                map.setCenter(new kakao.maps.LatLng(userLatitude, userLongitude));
            });
        }
    }

    function switchTab(tabName) {
        currentTab = tabName;
        
        document.getElementById('tab-shop').classList.remove('active');
        document.getElementById('tab-ev').classList.remove('active');
        document.getElementById('tab-bookmark').classList.remove('active');
        
        const searchArea = document.getElementById('search-area');
        clearAllResults();

        if(tabName === 'shop') {
            document.getElementById('tab-shop').classList.add('active');
            searchArea.style.display = "flex";
            document.getElementById('keyword').placeholder = "제로웨이스트 샵 검색...";
        } else if (tabName === 'ev') {
            document.getElementById('tab-ev').classList.add('active');
            searchArea.style.display = "flex";
            document.getElementById('keyword').placeholder = "전기차 충전소 검색...";
        } else if (tabName === 'bookmark') {
            document.getElementById('tab-bookmark').classList.add('active');
            searchArea.style.display = "none";
            displayBookmarks();
        }

        document.getElementById('region-select').value = "";
        document.getElementById('keyword').value = "";
    }

    function searchNearby() {
        clearAllResults();
        document.getElementById('region-select').value = "";

        const searchCenter = new kakao.maps.LatLng(userLatitude, userLongitude);
        map.setCenter(searchCenter);

        // [수정] 무분별하게 차단되지 않도록 카카오 정식 키워드 셋업 적용
        const searchQuery = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        
        const searchOptions = {
            location: searchCenter,
            radius: 5000, 
            sort: kakao.maps.services.SortBy.ACCURACY
        };

        ps.keywordSearch(searchQuery, placesSearchCB, searchOptions);
    }

    function selectRegion() {
        const selectedRegion = document.getElementById('region-select').value;
        clearAllResults();

        if (!selectedRegion) return;

        const targetCategory = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        const fullQuery = `${selectedRegion} ${targetCategory}`;

        ps.keywordSearch(fullQuery, placesSearchCB);
    }

    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('검색어를 입력해주세요!');
            return;
        }

        document.getElementById('region-select').value = "";
        clearAllResults();

        const suffix = (currentTab === 'shop') ? " 제로웨이스트" : " 전기차";
        ps.keywordSearch(keyword + suffix, placesSearchCB);
    }

    // [수정] 결과 누락을 일으키던 깐깐한 수동 필터 루프를 지우고 카카오 결과를 그대로 수용
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    function displayPlaces(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        const iconTag = (currentTab === 'shop') ? "🌿" : "⚡";

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            const shopFormat = {
                id: places[i].id,
                name: places[i].place_name,
                address: places[i].road_address_name || places[i].address_name,
                phone: places[i].phone || "번호 등록 없음",
                lat: places[i].y,
                lng: places[i].x,
                type: currentTab
            };

            const overlay = displayBearOverlay(placePosition, shopFormat);
            bounds.extend(placePosition);

            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shopFormat.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shopFormat.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shopFormat.phone}</div>
                <button class="btn-bookmark btn-save" id="btn-save-${shopFormat.id}">⭐ 저장</button>
            `;
            
            itemEl.onclick = function(e) {
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(overlay, shopFormat);
            };

            const saveBtn = itemEl.querySelector(`#btn-save-${shopFormat.id}`);
            saveBtn.onclick = function() {
                addBookmark(shopFormat);
            };

            listEl.appendChild(itemEl);
        }

        map.setBounds(bounds);
    }

    function displayBearOverlay(position, shop) {
        const content = document.createElement('div');
        content.className = 'bear-marker-pin';
        content.innerHTML = '🐻'; 

        const overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            yAnchor: 1 
        });

        overlay.setMap(map);

        content.onclick = function() {
            openInfoWindow(overlay, shop);
        };

        customOverlays.push(overlay);
        return overlay;
    }

    function openInfoWindow(overlay, shop) {
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        const iconTag = (shop.type === 'shop') ? "🐻" : "🔋";
        const contentString = `
            <div class="info-window-content">
                <h4>${iconTag} ${shop.name}</h4>
                <p>${shop.address}</p>
            </div>
        `;

        const infoWindow = new kakao.maps.InfoWindow({
            content: contentString,
            removable: true
        });

        infoWindow.open(map, overlay);
        activeInfoWindow = infoWindow;
    }

    function addBookmark(shop) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        const isExist = bookmarks.some(item => item.id === shop.id);
        if (isExist) {
            alert('이미 자주 찾는 장소에 등록된 곳입니다!');
            return;
        }
        bookmarks.push(shop);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        alert('🌿 자주 찾는 장소에 저장되었습니다!');
    }

    function deleteBookmark(shopId) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        bookmarks = bookmarks.filter(item => item.id !== shopId);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        clearAllResults();
        displayBookmarks();
    }

    function displayBookmarks() {
        const listEl = document.getElementById('results-list');
        const bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];

        if (bookmarks.length === 0) {
            listEl.innerHTML = `<li style="color: #a5d6a7; text-align: center; margin-top: 50px; font-size: 14px;">아직 저장된 장소가 없습니다.</li>`;
            return;
        }

        const bounds = new kakao.maps.LatLngBounds();

        bookmarks.forEach(shop => {
            const placePosition = new kakao.maps.LatLng(shop.lat, shop.lng);
            const overlay = displayBearOverlay(placePosition, shop);
            bounds.extend(placePosition);

            const iconTag = (shop.type === 'shop') ? "🌿" : "⚡";

            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shop.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shop.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shop.phone}</div>
                <button class="btn-bookmark btn-delete" id="btn-del-${shop.id}">❌ 삭제</button>
            `;

            itemEl.onclick = function(e) {
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(overlay, shop);
            };

            const delBtn = itemEl.querySelector(`#btn-del-${shop.id}`);
            delBtn.onclick = function() {
                deleteBookmark(shop.id);
            };

            listEl.appendChild(itemEl);
        });

        map.setBounds(bounds);
    }

    function clearAllResults() {
        for (let i = 0; i < customOverlays.length; i++) {
            customOverlays[i].setMap(null);
        }
        customOverlays = [];
        document.getElementById('results-list').innerHTML = '';
        if (activeInfoWindow) {
            activeInfoWindow.close();
            activeInfoWindow = null;
        }
    }

    document.getElementById('keyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchPlaces();
    });
</script>

</body>
</html>
