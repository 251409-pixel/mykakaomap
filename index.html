<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구랑 썸타기 - 친환경 거점 찾기</title>
    <style>
        /* 전체 레이아웃 및 숲 테마 기본 색상 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #1b3b22;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 스타일 (짙은 숲속 초록색) */
        .sidebar {
            width: 380px;
            height: 100%;
            background: #1b3b22; /* 딥 포레스트 그린 */
            display: flex;
            flex-direction: column;
            border-right: 2px solid #142d1a;
            z-index: 10;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }
        
        /* 서비스 타이틀 */
        .sidebar-title {
            padding: 20px 20px 10px 20px;
            color: #e8f5e9;
            margin: 0;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            letter-spacing: -1px;
        }
        
        /* 탭 메뉴 스타일 (즐겨찾기 탭 추가로 인해 3분할) */
        .tab-menu {
            display: flex;
            padding: 0 15px;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 5px;
            background: #254d2e;
            color: #a5d6a7;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            background: #2e7d32;
            color: #ffffff;
            border-bottom: 2px solid #81c784;
        }

        /* 검색 영역 박스 */
        .search-box {
            padding: 15px;
            background: #2e7d32; 
            margin: 0 15px 10px 15px;
            border-radius: 0 0 6px 6px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* 입력창 및 셀렉트 박스 스타일 */
        .search-box select, .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #1b3b22;
            border-radius: 6px;
            font-size: 14px;
            background-color: #1b3b22;
            color: #ffffff;
            box-sizing: border-box;
        }
        .search-box select option {
            background-color: #1b3b22;
            color: #ffffff;
        }
        .search-box input::placeholder {
            color: #a5d6a7;
        }

        .search-row {
            display: flex;
            gap: 5px;
        }
        
        /* 버튼 스타일 */
        .btn-search {
            width: 30%;
            padding: 10px;
            background: #81c784; 
            color: #1b3b22;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-nearby {
            width: 100%;
            padding: 10px;
            background: #8d6e63; 
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
        }
        .btn-search:hover { background: #66bb6a; }
        .btn-nearby:hover { background: #795548; }

        /* 검색 결과 및 즐겨찾기 리스트 스타일 */
        #results-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0;
            padding: 10px 15px;
        }
        #results-list::-webkit-scrollbar {
            width: 6px;
        }
        #results-list::-webkit-scrollbar-thumb {
            background: #2e5a36;
            border-radius: 4px;
        }
        
        /* 나뭇잎 카드 디자인 */
        .item {
            padding: 15px;
            border-radius: 8px;
            background: #254d2e;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #81c784;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }
        .item:hover {
            background: #2e5a36;
            transform: translateY(-2px);
        }
        .item h5 {
            margin: 0 0 8px 0;
            color: #ffffff; 
            font-size: 15px;
            padding-right: 60px; /* 버튼과 겹치지 않도록 여백 설정 */
        }
        .item .info-text {
            font-size: 12px;
            color: #c8e6c9;
            margin: 4px 0;
        }
        .item .label {
            font-weight: bold;
            color: #81c784;
            margin-right: 5px;
        }

        /* [기능 추가] 저장 / 삭제 버튼 스타일 */
        .btn-bookmark {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save {
            background: #fff59d;
            color: #5d4037;
        }
        .btn-save:hover { background: #fff176; }
        .btn-delete {
            background: #ffab91;
            color: #d84315;
        }
        .btn-delete:hover { background: #ff8a65; }

        /* 오른쪽 지도 영역 및 오버레이 숲 레이어 */
        .map-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* 지도 위 초록색 숲 감성 오버레이 필터 */
        .forest-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(46, 125, 50, 0.1);
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 5;
        }

        /* 팝업(인포윈도우) 내부 커스텀 스타일 */
        .info-window-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 160px;
            background: #f1f8e9;
            border-radius: 4px;
        }
        .info-window-content h4 {
            margin: 0 0 5px 0;
            color: #1b3b22;
            font-size: 14px;
        }
        .info-window-content p {
            margin: 0;
            color: #4c8c4a;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h1 class="sidebar-title">🌳 지구랑 썸타기</h1>
        
        <div class="tab-menu">
            <button id="tab-shop" class="tab-btn active" onclick="switchTab('shop')">제로웨이스트 샵</button>
            <button id="tab-ev" class="tab-btn" onclick="switchTab('ev')">전기차 충전소</button>
            <button id="tab-bookmark" class="tab-btn" onclick="switchTab('bookmark')">⭐ 자주 찾는 곳</button>
        </div>

        <div class="search-box" id="search-area">
            <select id="region-select" onchange="selectRegion()">
                <option value="">-- 탐색할 지역 선택 (도 단위) --</option>
                <option value="서울">서울특별시</option>
                <option value="경기">경기도</option>
                <option value="강원">강원도</option>
                <option value="충북">충청북도</option>
                <option value="충남">충청남도</option>
                <option value="전북">전라북도</option>
                <option value="전남">전라남도</option>
                <option value="경북">경상북도</option>
                <option value="경남">경상남도</option>
                <option value="제주">제주특별자치도</option>
            </select>
            
            <div class="search-row">
                <input type="text" id="keyword" placeholder="직접 장소 검색...">
                <button class="btn-search" onclick="searchPlaces()">검색</button>
            </div>

            <button class="btn-nearby" onclick="searchNearby()">📍 내 위치 주변 검색하기</button>
        </div>
        
        <ul id="results-list"></ul>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
        <div class="forest-overlay"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=db51ba2fd4b1815d12500754751086cf&libraries=services&autoload=false"></script>

<script>
    let map;
    let ps; // 장소 검색 객체
    let markers = []; // 마커 배열
    let activeInfoWindow = null; // 열려있는 팝업 추적
    let currentTab = 'shop'; // 현재 선택된 탭 ('shop', 'ev', 'bookmark')
    let userLatitude = 37.566826; // 사용자 위도 기본값
    let userLongitude = 126.9786567; // 사용자 경도 기본값

    // 지도 핀 마커 이미지 (귀여운 곰돌이)
    const BEAR_MARKER_IMAGE_URL = 'https://cdn-icons-png.flaticon.com/512/4148/4148530.png'; 

    // 카카오맵 초기화
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(userLatitude, userLongitude),
            level: 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        // 현재 위치 좌표 동기화
        syncUserLocation();
    });

    // 현재 위치를 브라우저 GPS로 가져오는 함수
    function syncUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLatitude = position.coords.latitude;
                userLongitude = position.coords.longitude;
                map.setCenter(new kakao.maps.LatLng(userLatitude, userLongitude));
            });
        }
    }

    // 탭 전환 처리 함수
    function switchTab(tabName) {
        currentTab = tabName;
        
        // 모든 탭 버튼 활성화 클래스 제거
        document.getElementById('tab-shop').classList.remove('active');
        document.getElementById('tab-ev').classList.remove('active');
        document.getElementById('tab-bookmark').classList.remove('active');
        
        // 검색창 영역 엘리먼트 가시성 제어용
        const searchArea = document.getElementById('search-area');

        // 기존 렌더링 결과 일괄 청소
        clearAllResults();

        if(tabName === 'shop') {
            document.getElementById('tab-shop').classList.add('active');
            searchArea.style.display = "flex"; // 검색 필터 노출
            document.getElementById('keyword').placeholder = "제로웨이스트 샵 검색...";
        } else if (tabName === 'ev') {
            document.getElementById('tab-ev').classList.add('active');
            searchArea.style.display = "flex"; // 검색 필터 노출
            document.getElementById('keyword').placeholder = "전기차 충전소 검색...";
        } else if (tabName === 'bookmark') {
            document.getElementById('tab-bookmark').classList.add('active');
            searchArea.style.display = "none"; // 즐겨찾기 탭에서는 상단 검색바를 숨김 처리하여 깔끔하게 제공
            displayBookmarks(); // 저장된 즐겨찾기 리스트 로드 및 표기
        }

        // 검색어 입력 필드 초기화
        document.getElementById('region-select').value = "";
        document.getElementById('keyword').value = "";
    }

    // 내 위치 주변 검색 기능
    function searchNearby() {
        clearAllResults();
        document.getElementById('region-select').value = "";

        const searchCenter = new kakao.maps.LatLng(userLatitude, userLongitude);
        map.setCenter(searchCenter);

        const searchQuery = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        const searchOptions = {
            location: searchCenter,
            radius: 5000,
            sort: kakao.maps.services.SortBy.ACCURACY
        };

        ps.keywordSearch(searchQuery, placesSearchCB, searchOptions);
    }

    // 지정한 특정 지역(도 단위) 전체 검색 기능
    function selectRegion() {
        const selectedRegion = document.getElementById('region-select').value;
        clearAllResults();

        if (!selectedRegion) return;

        const targetCategory = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        const fullQuery = `${selectedRegion} ${targetCategory}`;

        ps.keywordSearch(fullQuery, placesSearchCB);
    }

    // 키워드 텍스트 검색 기능
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('검색어를 입력해주세요!');
            return;
        }

        document.getElementById('region-select').value = "";
        clearAllResults();

        const suffix = (currentTab === 'shop') ? " 제로웨이스트" : " 전기차";
        ps.keywordSearch(keyword + suffix, placesSearchCB);
    }

    // 장소 검색 결과 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 검색된 데이터를 지도 마커와 리스트에 출력하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        const iconTag = (currentTab === 'shop') ? "🌿" : "⚡";

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            const shopFormat = {
                id: places[i].id, // 고유 ID 저장용으로 사용
                name: places[i].place_name,
                address: places[i].road_address_name || places[i].address_name,
                phone: places[i].phone || "번호 등록 없음",
                lat: places[i].y,
                lng: places[i].x,
                type: currentTab // shop 또는 ev 타입 보존
            };

            const marker = displayBearMarker(placePosition, shopFormat);
            bounds.extend(placePosition);

            // 사이드바 아이템 엘리먼트 카드 빌드
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shopFormat.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shopFormat.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shopFormat.phone}</div>
                <button class="btn-bookmark btn-save" id="btn-save-${shopFormat.id}">⭐ 저장</button>
            `;
            
            // 카드 바디 클릭 시 지도 이동 및 마커 인포윈도우 오픈
            itemEl.onclick = function(e) {
                // 저장 버튼 클릭 시에는 지도 이동 이벤트가 발동하지 않도록 방어 코드 추가
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(marker, shopFormat);
            };

            // [기능 추가] 저장 버튼 클릭 이벤트 리스너 설정
            const saveBtn = itemEl.querySelector(`#btn-save-${shopFormat.id}`);
            saveBtn.onclick = function() {
                addBookmark(shopFormat);
            };

            listEl.appendChild(itemEl);
        }

        map.setBounds(bounds);
    }

    // 곰 커스텀 마커 생성 함수
    function displayBearMarker(position, shop) {
        const imageSize = new kakao.maps.Size(38, 38); 
        const markerImage = new kakao.maps.MarkerImage(BEAR_MARKER_IMAGE_URL, imageSize);

        const marker = new kakao.maps.Marker({
            map: map,
            position: position,
            image: markerImage
        });

        kakao.maps.event.addListener(marker, 'click', function() {
            openInfoWindow(marker, shop);
        });

        markers.push(marker);
        return marker;
    }

    // 인포윈도우 열기 함수
    function openInfoWindow(marker, shop) {
        if (activeInfoWindow) {
            activeInfoWindow.close();
        }

        const iconTag = (shop.type === 'shop') ? "🐻" : "🔋";
        const content = `
            <div class="info-window-content">
                <h4>${iconTag} ${shop.name}</h4>
                <p>${shop.address}</p>
            </div>
        `;

        const infoWindow = new kakao.maps.InfoWindow({
            content: content,
            removable: true
        });

        infoWindow.open(map, marker);
        activeInfoWindow = infoWindow;
    }

    // [기능 추가] 로컬 스토리지에 즐겨찾기 장소 추가하는 함수
    function addBookmark(shop) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        
        // 이미 저장된 장소인지 중복 검사
        const isExist = bookmarks.some(item => item.id === shop.id);
        if (isExist) {
            alert('이미 자주 찾는 장소에 등록된 곳입니다!');
            return;
        }

        bookmarks.push(shop);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        alert('🌿 자주 찾는 장소에 저장되었습니다!');
    }

    // [기능 추가] 로컬 스토리지에서 즐겨찾기 장소 삭제하는 함수
    function deleteBookmark(shopId) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        bookmarks = bookmarks.filter(item => item.id !== shopId);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        
        // 즐겨찾기 리스트 갱신 렌더링
        clearAllResults();
        displayBookmarks();
    }

    // [기능 추가] 자주 찾는 장소(즐겨찾기) 리스트를 화면과 지도에 렌더링하는 함수
    function displayBookmarks() {
        const listEl = document.getElementById('results-list');
        const bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];

        if (bookmarks.length === 0) {
            listEl.innerHTML = `<li style="color: #a5d6a7; text-align: center; margin-top: 50px; font-size: 14px;">아직 저장된 장소가 없습니다.<br>샵이나 충전소를 검색 후 ⭐ 저장 버튼을 눌러보세요!</li>`;
            return;
        }

        const bounds = new kakao.maps.LatLngBounds();

        bookmarks.forEach(shop => {
            const placePosition = new kakao.maps.LatLng(shop.lat, shop.lng);
            const marker = displayBearMarker(placePosition, shop);
            bounds.extend(placePosition);

            const iconTag = (shop.type === 'shop') ? "🌿" : "⚡";

            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shop.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shop.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shop.phone}</div>
                <button class="btn-bookmark btn-delete" id="btn-del-${shop.id}">❌ 삭제</button>
            `;

            // 클릭 시 해당 지도 위치 표기
            itemEl.onclick = function(e) {
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(marker, shop);
            };

            // 삭제 버튼 이벤트 바인딩
            const delBtn = itemEl.querySelector(`#btn-del-${shop.id}`);
            delBtn.onclick = function() {
                deleteBookmark(shop.id);
            };

            listEl.appendChild(itemEl);
        });

        map.setBounds(bounds);
    }

    // 화면 데이터 초기화 헬퍼 함수
    function clearAllResults() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
        document.getElementById('results-list').innerHTML = '';
        if (activeInfoWindow) {
            activeInfoWindow.close();
            activeInfoWindow = null;
        }
    }

    // 엔터키 처리
    document.getElementById('keyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchPlaces();
    });
</script>

</body>
</html>
