<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 장소 검색 서비스</title>
    <style>
        /* 전체 레이아웃 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 350px;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }
        .search-box {
            padding: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-box input {
            width: 70%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-box button {
            width: 25%;
            padding: 8px;
            background: #fae100; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 스타일 */
        #results-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .item:hover {
            background: #f0f0f0;
        }
        .item h5 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .item span {
            font-size: 12px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소를 입력하세요">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <ul id="results-list">
            </ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=db51ba2fd4b1815d12500754751086cf&libraries=services&autoload=false"></script>

<script>
    let map;
    let ps; // 장소 검색 객체
    let markers = []; // 마커를 담을 배열

    // 지도가 완전히 로드된 후 실행
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표 (서울시청)
            level: 5 // 확대 레벨 5
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOption);
        
        // 장소 검색 서비스 객체 생성
        ps = new kakao.maps.services.Places();

        // 현재 위치 가져오기
        getCurrentLocation();
    });

    // 1. 현재 위치를 가져오는 함수
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                // 지도 중심을 현재 위치로 이동
                map.setCenter(locPosition);
                
                // 현재 위치 마커 표시 (선택사항)
                displayMarker(locPosition, '내 위치');
            }, function(err) {
                console.error("위치 정보를 가져오지 못했습니다.", err);
            });
        }
    }

    // 2. 검색창 엔터키 이벤트 추가
    document.getElementById('keyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchPlaces();
    });

    // 3. 키워드 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 카카오 장소 검색 API 호출
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 4. 검색 결과 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 5. 검색 결과 리스트와 마커 표시
    function displayPlaces(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        // 기존 마커와 리스트 삭제
        removeMarkers();
        listEl.innerHTML = '';

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = displayMarker(placePosition, places[i].place_name);
            bounds.extend(placePosition);

            // 리스트 아이템 추가
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `<h5>${places[i].place_name}</h5><span>${places[i].road_address_name || places[i].address_name}</span>`;
            
            // 리스트 클릭 시 해당 위치로 이동
            itemEl.onclick = function() {
                map.panTo(placePosition);
            };

            listEl.appendChild(itemEl);
        }

        // 검색된 장소들이 모두 보이도록 지도 범위 조정
        map.setBounds(bounds);
    }

    // 6. 마커 생성 함수
    function displayMarker(position, title) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: position
        });
        markers.push(marker);
        return marker;
    }

    // 7. 이전 마커 제거 함수
    function removeMarkers() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }
</script>

</body>
</html>
