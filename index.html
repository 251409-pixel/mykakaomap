<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구랑 썸타기 - 친환경 거점 찾기</title>
    <style>
        /* 웹폰트 로드: 아기자기하고 귀여운 눈누 프리텐다드/이롭게 바탕 스타일 조합 */
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Orbit&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Gaegu', 'Malgun Gothic', sans-serif;
            background-color: #0d2613;
            overflow: hidden;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* [디자인 변경] 사이드바를 더 키치한 포레스트 힙 감성으로 */
        .sidebar {
            width: 390px;
            height: 100%;
            background: linear-gradient(135deg, #0d2613 0%, #173d20 100%); 
            display: flex;
            flex-direction: column;
            border-right: 4px dashed #76ff03; /* 네온 라임 포인트선 */
            z-index: 10;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
        }
        
        .sidebar-title {
            padding: 25px 20px 10px 20px;
            color: #76ff03;
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 1px;
        }
        
        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            padding: 0 15px;
            gap: 6px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: #1b4d27;
            color: #a5d6a7;
            border: 2px solid #0d2613;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            font-family: 'Gaegu', sans-serif;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #76ff03;
            color: #0d2613;
            border: 2px solid #76ff03;
            border-bottom: none;
            transform: translateY(-2px);
            box-shadow: 0 -4px 10px rgba(118,255,3,0.3);
        }

        /* 검색 영역 박스 */
        .search-box {
            padding: 18px;
            background: #235e31; 
            margin: 0 15px 15px 15px;
            border-radius: 0 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 2px solid #76ff03;
            border-top: none;
        }
        
        .search-box select, .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #0d2613;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Gaegu', sans-serif;
            background-color: #0d2613;
            color: #ffffff;
            box-sizing: border-box;
        }
        .search-box select:focus, .search-box input:focus {
            outline: none;
            border-color: #76ff03;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }
        
        .btn-search {
            width: 30%;
            padding: 10px;
            background: #76ff03; 
            color: #0d2613;
            border: 2px solid #0d2613;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Gaegu', sans-serif;
        }
        .btn-nearby {
            width: 100%;
            padding: 12px;
            background: #ff7043; 
            color: #ffffff;
            border: 2px solid #0d2613;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Gaegu', sans-serif;
            box-shadow: 0 4px 0px #bf360c;
        }
        .btn-nearby:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #bf360c;
        }

        /* 검색 결과 리스트 크래프트 스티커 감성 디자인 */
        #results-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            margin: 0;
            padding: 5px 15px;
        }
        
        .item {
            padding: 18px;
            border-radius: 14px;
            background: #fbe9e7; /* 부드러운 살구 크래프트지 느낌 */
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #0d2613;
            box-shadow: 4px 4px 0px #0d2613;
            position: relative;
        }
        .item:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #76ff03;
            background: #ffffff;
        }
        .item h5 {
            margin: 0 0 10px 0;
            color: #0d2613; 
            font-size: 19px;
            font-weight: bold;
            padding-right: 65px;
        }
        .item .info-text {
            font-size: 14px;
            color: #4e342e;
            margin: 5px 0;
        }
        .item .label {
            font-weight: bold;
            color: #e64a19;
            margin-right: 6px;
        }

        .btn-bookmark {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 6px 10px;
            font-size: 14px;
            font-family: 'Gaegu', sans-serif;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #0d2613;
            cursor: pointer;
        }
        .btn-save { background: #ccff90; color: #0d2613; box-shadow: 2px 2px 0px #0d2613; }
        .btn-delete { background: #ff8a80; color: #0d2613; box-shadow: 2px 2px 0px #0d2613; }

        /* 지도 영역 키치 필터 */
        .map-wrapper {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* [변경] 단조로운 지도를 숲속 네온 팝 아트로 덮어주는 특수 오버레이 */
        .forest-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(118,255,3,0.03) 0%, rgba(13,38,19,0.15) 100%);
            mix-blend-mode: color-burn;
            pointer-events: none;
            z-index: 5;
        }

        /* 곰돌이 오버레이 마커 핀 스타일 */
        .bear-marker-pin {
            font-size: 38px;
            cursor: pointer;
            filter: drop-shadow(3px 3px 0px #0d2613);
            transition: transform 0.2s ease;
        }
        .bear-marker-pin:hover {
            transform: scale(1.3) rotate(-10deg);
        }

        /* 말풍선 팝업 창 스타일 */
        .info-window-content {
            padding: 12px;
            font-size: 15px;
            line-height: 1.4;
            min-width: 180px;
            background: #fff9c4;
            border: 2px solid #0d2613;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #0d2613;
            font-family: 'Gaegu', sans-serif;
        }
        .info-window-content h4 {
            margin: 0 0 6px 0;
            color: #d84315;
            font-size: 17px;
        }
        .info-window-content p {
            margin: 0;
            color: #1b5e20;
        }

        /* ================= [새로 추가] 키치 포레스트 커스텀 모달 팝업 디자인 ================= */
        .forest-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(13, 38, 19, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .forest-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .forest-modal {
            background: #fff;
            border: 4px solid #0d2613;
            border-radius: 24px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 8px 8px 0px #76ff03, 12px 12px 0px #000;
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background-image: radial-gradient(#ccff90 1.5px, transparent 1.5px), radial-gradient(#ccff90 1.5px, #ffffff 1.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .forest-modal-overlay.show .forest-modal {
            transform: scale(1);
        }
        .modal-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: wave 1s infinite alternate;
        }
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #0d2613;
            margin-bottom: 15px;
        }
        /* 사용자가 지정한 키치 문구 배너 스타일 */
        .modal-banner {
            background: #0d2613;
            color: #76ff03;
            font-size: 22px;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            transform: rotate(-3deg);
            box-shadow: 3px 3px 0px #ff7043;
            letter-spacing: 1px;
        }
        .modal-banner.save-theme {
            background: #ff7043;
            color: #ffffff;
            box-shadow: 3px 3px 0px #0d2613;
        }
        .btn-modal-close {
            background: #0d2613;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-family: 'Gaegu', sans-serif;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #76ff03;
        }
        .btn-modal-close:hover {
            background: #1b4d27;
        }

        @keyframes wave {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

<div class="forest-modal-overlay" id="custom-modal-overlay">
    <div class="forest-modal">
        <span class="modal-icon" id="modal-icon">🦊</span>
        <div class="modal-title" id="modal-title">시스템 알림</div>
        <div class="modal-banner" id="modal-banner">지구 살리기 GREEN GREEN</div>
        <button class="btn-modal-close" onclick="closeForestModal()">확인 완료! 🌳</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h1 class="sidebar-title">⚡ 지구랑 썸타기 🐻</h1>
        
        <div class="tab-menu">
            <button id="tab-shop" class="tab-btn active" onclick="switchTab('shop')">제로웨이스트 샵</button>
            <button id="tab-ev" class="tab-btn" onclick="switchTab('ev')">전기차 충전소</button>
            <button id="tab-bookmark" class="tab-btn" onclick="switchTab('bookmark')">⭐ 자주 찾는 곳</button>
        </div>

        <div class="search-box" id="search-area">
            <select id="region-select" onchange="selectRegion()">
                <option value="">-- 숲속 탐색지역 선택 --</option>
                <option value="서울">서울특별시</option>
                <option value="경기">경기도</option>
                <option value="강원">강원도</option>
                <option value="충북">충청북도</option>
                <option value="충남">충청남도</option>
                <option value="전북">전라북도</option>
                <option value="전남">전라남도</option>
                <option value="경북">경상북도</option>
                <option value="경남">경상남도</option>
                <option value="제주">제주특별자치도</option>
            </select>
            
            <div class="search-row">
                <input type="text" id="keyword" placeholder="제로웨이스트 샵 검색...">
                <button class="btn-search" onclick="searchPlaces()">검색</button>
            </div>

            <button class="btn-nearby" onclick="searchNearby()">📍 내 위치 주변 검색하기</button>
        </div>
        
        <ul id="results-list"></ul>
    </div>

    <div class="map-wrapper">
        <div id="map"></div>
        <div class="forest-overlay"></div>
    </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_JAVASCRIPT_KEY&libraries=services"></script>

<script>
    let map;
    let ps; 
    let customOverlays = []; 
    let activeInfoWindow = null; 
    let currentTab = 'shop'; 
    let userLatitude = 37.566826; 
    let userLongitude = 126.9786567; 

    // [추가] 커스텀 모달 제어 함수
    function showForestModal(type, targetName) {
        const overlay = document.getElementById('custom-modal-overlay');
        const icon = document.getElementById('modal-icon');
        const title = document.getElementById('modal-title');
        const banner = document.getElementById('modal-banner');

        if (type === 'search') {
            icon.innerHTML = '🍃';
            title.innerHTML = `숲속 탐색 기지 가동!`;
            banner.innerHTML = `지구 살리기 GREEN GREEN`;
            banner.className = 'modal-banner'; // 기본 초록테마
        } else if (type === 'save') {
            icon.innerHTML = '💖';
            title.innerHTML = `[${targetName}]`;
            banner.innerHTML = `내 마음 속에 저장`;
            banner.className = 'modal-banner save-theme'; // 주황 키치테마
        }

        overlay.classList.add('show');
    }

    function closeForestModal() {
        document.getElementById('custom-modal-overlay').classList.remove('show');
    }

    try {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(userLatitude, userLongitude),
            level: 4
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places();

        syncUserLocation();
    } catch(e) {
        console.error("카카오맵 초기화 실패: 키 설정을 확인하세요.");
    }

    function syncUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLatitude = position.coords.latitude;
                userLongitude = position.coords.longitude;
                if(map) map.setCenter(new kakao.maps.LatLng(userLatitude, userLongitude));
            });
        }
    }

    function switchTab(tabName) {
        currentTab = tabName;
        
        document.getElementById('tab-shop').classList.remove('active');
        document.getElementById('tab-ev').classList.remove('active');
        document.getElementById('tab-bookmark').classList.remove('active');
        
        const searchArea = document.getElementById('search-area');
        clearAllResults();

        if(tabName === 'shop') {
            document.getElementById('tab-shop').classList.add('active');
            searchArea.style.display = "flex";
            document.getElementById('keyword').placeholder = "제로웨이스트 샵 검색...";
        } else if (tabName === 'ev') {
            document.getElementById('tab-ev').classList.add('active');
            searchArea.style.display = "flex";
            document.getElementById('keyword').placeholder = "전기차 충전소 검색...";
        } else if (tabName === 'bookmark') {
            document.getElementById('tab-bookmark').classList.add('active');
            searchArea.style.display = "none";
            displayBookmarks();
        }

        document.getElementById('region-select').value = "";
        document.getElementById('keyword').value = "";
    }

    function searchNearby() {
        clearAllResults();
        document.getElementById('region-select').value = "";
        const searchCenter = new kakao.maps.LatLng(userLatitude, userLongitude);
        map.setCenter(searchCenter);

        const searchQuery = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        
        showForestModal('search'); // [수정] 검색시 커스텀 팝업 가동

        ps.keywordSearch(searchQuery, placesSearchCB, {
            location: searchCenter,
            radius: 5000, 
            sort: kakao.maps.services.SortBy.ACCURACY
        });
    }

    function selectRegion() {
        const selectedRegion = document.getElementById('region-select').value;
        clearAllResults();
        if (!selectedRegion) return;

        const targetCategory = (currentTab === 'shop') ? "제로웨이스트" : "전기차충전소";
        
        showForestModal('search'); // [수정] 지역 선택 시 커스텀 팝업 가동
        ps.keywordSearch(`${selectedRegion} ${targetCategory}`, placesSearchCB);
    }

    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;
        if (!keyword.trim()) {
            alert('검색어를 입력해주세요!');
            return;
        }

        document.getElementById('region-select').value = "";
        clearAllResults();

        const suffix = (currentTab === 'shop') ? " 제로웨이스트" : " 전기차";
        showForestModal('search'); // [수정] 검색 단추 클릭 시 커스텀 팝업 가동
        ps.keywordSearch(keyword + suffix, placesSearchCB);
    }

    function placesSearchCB(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            closeForestModal();
            alert('검색 결과가 존재하지 않습니다.');
        } else {
            closeForestModal();
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    function displayPlaces(places) {
        const listEl = document.getElementById('results-list');
        const bounds = new kakao.maps.LatLngBounds();
        const iconTag = (currentTab === 'shop') ? "🌿" : "⚡";

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            
            const shopFormat = {
                id: places[i].id,
                name: places[i].place_name,
                address: places[i].road_address_name || places[i].address_name,
                phone: places[i].phone || "번호 등록 없음",
                lat: places[i].y,
                lng: places[i].x,
                type: currentTab
            };

            const overlay = displayBearOverlay(placePosition, shopFormat);
            bounds.extend(placePosition);

            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shopFormat.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shopFormat.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shopFormat.phone}</div>
                <button class="btn-bookmark btn-save" id="btn-save-${shopFormat.id}">⭐ 저장</button>
            `;
            
            itemEl.onclick = function(e) {
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(overlay, shopFormat);
            };

            itemEl.querySelector(`#btn-save-${shopFormat.id}`).onclick = function() {
                addBookmark(shopFormat);
            };

            listEl.appendChild(itemEl);
        }
        map.setBounds(bounds);
    }

    function displayBearOverlay(position, shop) {
        const content = document.createElement('div');
        content.className = 'bear-marker-pin';
        content.innerHTML = '🐻'; 

        const overlay = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            yAnchor: 1 
        });

        overlay.setMap(map);
        content.onclick = function() { openInfoWindow(overlay, shop); };
        customOverlays.push(overlay);
        return overlay;
    }

    function openInfoWindow(overlay, shop) {
        if (activeInfoWindow) activeInfoWindow.close();

        const iconTag = (shop.type === 'shop') ? "🐻" : "🔋";
        const infoWindow = new kakao.maps.InfoWindow({
            content: `<div class="info-window-content"><h4>${iconTag} ${shop.name}</h4><p>${shop.address}</p></div>`,
            removable: true
        });

        infoWindow.open(map, overlay);
        activeInfoWindow = infoWindow;
    }

    function addBookmark(shop) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        if (bookmarks.some(item => item.id === shop.id)) {
            alert('이미 자주 찾는 장소에 등록된 곳입니다!');
            return;
        }
        bookmarks.push(shop);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        
        showForestModal('save', shop.name); // [수정] 장소 저장 시 커스텀 팝업 가동
    }

    function deleteBookmark(shopId) {
        let bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];
        bookmarks = bookmarks.filter(item => item.id !== shopId);
        localStorage.setItem('earth_bookmarks', JSON.stringify(bookmarks));
        clearAllResults();
        displayBookmarks();
    }

    function displayBookmarks() {
        const listEl = document.getElementById('results-list');
        const bookmarks = JSON.parse(localStorage.getItem('earth_bookmarks')) || [];

        if (bookmarks.length === 0) {
            listEl.innerHTML = `<li style="color: #a5d6a7; text-align: center; margin-top: 50px; font-size: 18px;">아직 저장된 숲이 없습니다 둥!</li>`;
            return;
        }

        const bounds = new kakao.maps.LatLngBounds();
        bookmarks.forEach(shop => {
            const placePosition = new kakao.maps.LatLng(shop.lat, shop.lng);
            const overlay = displayBearOverlay(placePosition, shop);
            bounds.extend(placePosition);

            const iconTag = (shop.type === 'shop') ? "🌿" : "⚡";
            const itemEl = document.createElement('li');
            itemEl.className = 'item';
            itemEl.innerHTML = `
                <h5>${iconTag} ${shop.name}</h5>
                <div class="info-text"><span class="label">주소:</span> ${shop.address}</div>
                <div class="info-text"><span class="label">전화:</span> ${shop.phone}</div>
                <button class="btn-bookmark btn-delete" id="btn-del-${shop.id}">❌ 삭제</button>
            `;

            itemEl.onclick = function(e) {
                if(e.target.classList.contains('btn-bookmark')) return;
                map.panTo(placePosition);
                openInfoWindow(overlay, shop);
            };

            itemEl.querySelector(`#btn-del-${shop.id}`).onclick = function() { deleteBookmark(shop.id); };
            listEl.appendChild(itemEl);
        });
        map.setBounds(bounds);
    }

    function clearAllResults() {
        customOverlays.forEach(o => o.setMap(null));
        customOverlays = [];
        document.getElementById('results-list').innerHTML = '';
        if (activeInfoWindow) { activeInfoWindow.close(); activeInfoWindow = null; }
    }

    document.getElementById('keyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchPlaces();
    });
</script>
</body>
</html>
